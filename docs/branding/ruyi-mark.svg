  <path class="au" d="M28 16 C29.8 22 31.6 23.8 37 25.5 C31.6 27.2 29.8 29 28 35 C26.2 29 24.4 27.2 19 25.5 C24.4 23.8 26.2 22 28 16 Z"/>
