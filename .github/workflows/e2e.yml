name: e2e

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 第36波(v1.7): 版本轴对齐 —— 打包(build:exe)与本地开发均为 node24,CI 此前钉 20。
          # 语法门也依赖 >=22 的 --check ESM 自动探测(app/public 是 ES Module)。
          node-version: '24'
      - name: Syntax gate (node --check)
        working-directory: ${{ github.workspace }}
        run: node dev-harness/syntax-gate.js
      # 第38波(v1.8-A): 并行跑 e2e,CI 反馈从 ~25min 降到 ~7min。
      # 端口已全面动态化,桶间不会撞车。路数可通过 --parallel N 调整。
      - name: Run e2e suite
        working-directory: ${{ github.workspace }}
        run: node dev-harness/run-all.js --parallel 4
      - name: Upload failure log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-log
          path: |
            dev-harness/*.log
          if-no-files-found: ignore
          retention-days: 7
