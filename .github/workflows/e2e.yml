name: e2e

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 第36波(v1.7): 版本轴对齐 —— 打包(build:exe)与本地开发均为 node24,CI 此前钉 20。
          # 语法门也依赖 >=22 的 --check ESM 自动探测(app/public 是 ES Module)。
          node-version: '24'
      - name: Syntax gate (node --check)
        working-directory: ${{ github.workspace }}
        run: node dev-harness/syntax-gate.js
      # 第43波: 产物新鲜度 fail-fast 门 —— 改了 src/ 忘跑 build 的陈旧产物在此拦截
      # (run-all 的 freshness 是自动重建继续测,那是对开发机友好;CI 必须【拒绝】陈旧入库)。
      - name: Build freshness (artifact == concat(src))
        working-directory: ${{ github.workspace }}
        run: node ruyi-workbench/app/build.js --check
      # 第38波(v1.8-A): 并行跑 e2e,CI 反馈从 ~25min 降到 ~7min。
      # 端口已全面动态化,桶间不会撞车。路数可通过 --parallel N 调整。
      - name: Run e2e suite
        working-directory: ${{ github.workspace }}
        # Several cases launch nested Node/Claude processes and share Windows-global
        # resources. Hosted runners can terminate them silently when buckets overlap.
        run: node dev-harness/run-all.js
      - name: Upload failure log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-log
          path: |
            dev-harness/*.log
          if-no-files-found: ignore
          retention-days: 7
